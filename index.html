<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Flute Key Helper</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f172a;color:#e2e8f0;margin:0;padding:20px}
.card{background:#1e293b;border-radius:16px;padding:20px;max-width:520px;margin:auto;box-shadow:0 10px 30px rgba(0,0,0,.3)}
h1{font-size:22px;margin-top:0}
select,button{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:none;font-size:16px}
select{background:#0f172a;color:white;border:1px solid #334155}
button{background:#3b82f6;color:white;font-weight:600}
.result{margin-top:20px;line-height:1.6}

/* 👇 badges plus compacts */
.badge{
  display:inline-block;
  background:#334155;
  padding:2px 6px;        /* réduit */
  border-radius:999px;
  font-size:10px;         /* réduit */
  margin-left:6px
}

.gold{background:#ca8a04}
.silver{background:#64748b}
.bronze{background:#92400e}
.rel{
  background:#7c3aed;
  transform:translateY(-1px); /* meilleur alignement */
}
</style>
</head>
<body>
<div class="card">
<h1>🪈 GuiOm̐ Flute Finder</h1>

<label>Note fondamentale</label>
<select id="root">
  <option>C</option><option>Db</option><option>D</option><option>Eb</option>
  <option>E</option><option>F</option><option>F#</option><option>G</option>
  <option>Ab</option><option>A</option><option>Bb</option><option>B</option>
</select>

<label>Mode</label>
<select id="mode">
  <option value="major">Majeur</option>
  <option value="minor">Mineur</option>
  <option value="dorian">Dorien</option>
  <option value="mixolydian">Mixolydien</option>
</select>

<button onclick="analyze()">Trouver les flûtes</button>

<div class="result" id="out"></div>
</div>

<script>
const relatives = {
"C":"Am","G":"Em","D":"Bm","A":"F#m","E":"C#m","B":"G#m","F#":"D#m","Db":"Bbm","Ab":"Fm","Eb":"Cm","Bb":"Gm","F":"Dm",
"Am":"C","Em":"G","Bm":"D","F#m":"A","C#m":"E","G#m":"B","D#m":"F#","Bbm":"Db","Fm":"Ab","Cm":"Eb","Gm":"Bb","Dm":"F"
};

const circle = ["C","G","D","A","E","B","F#","Db","Ab","Eb","Bb","F"];

function fifth(note){
  const i = circle.indexOf(note);
  return circle[(i+1+12)%12];
}

function neighbors(note){
  const i = circle.indexOf(note);
  return [
    circle[(i+11)%12],
    circle[(i+1)%12]
  ];
}

function strongSubdominant(note){
  const i = circle.indexOf(note);
  return circle[(i+10)%12];
}
function fifthOfRelative(rel){
  const r = rel.replace("m","");
  const i = circle.indexOf(r);
  return circle[(i+1)%12];
}

const flutes = [
  {name:"Whistle C", key:"C"},
  {name:"Whistle D", key:"D"},
  {name:"Whistle Bb", key:"Bb"},
  {name:"Bansuri E", key:"E"},
  {name:"Bansuri D", key:"D"},
  {name:"Bansuri C", key:"C"},
  {name:"Bansuri B", key:"B"},
  {name:"Bansuri A", key:"A"},
  {name:"Bansuri C#", key:"Db"},
  {name:"NAF Gm", key:"Gm"},
  {name:"NAF Dm", key:"Dm"},
  {name:"NAF Em", key:"Em"},
  {name:"NAF Eb", key:"Eb"},
  {name:"NAF Bm", key:"Bm"}
];

function analyze(){
  const root = document.getElementById("root").value;
const mode = document.getElementById("mode").value;

let k = root;
if(mode==="minor") k = root + "m";
if(mode==="dorian") k = root + " dorien";
if(mode==="mixolydian") k = root + " mixolydien";

const rel = relatives[k] || "-";
const relFifth = fifthOfRelative(rel);
  const q = fifth(root);
  const neigh = neighbors(root);
  const sub = strongSubdominant(root);

  let scored = flutes.map(f=>{
    const froot = f.key.replace("m","");
    let priority = 5;
    let tags = [];

   // 🥇 TONIQUE = priorité max
if(f.key===k){
  priority = 1;
  tags.push("tonique");
}

// 🥈 Relative MAJEURE exacte
else if(k.includes("m") && f.key===rel){
  priority = 2;
  tags.push("relativeMaj");
}

// ⭐ Relative MINEURE (plus bas)
else if(k.includes("m") && froot===rel.replace("m","") && f.key.includes("m")){
  priority = Math.min(priority,4);
  tags.push("relativeMinorColor");
}

    // 🎼 LOGIQUE MINEURE
    if(k.includes("m")){
      // 🥈 Relative majeure jouable
// 🥈 RelativePlayable STRONG (quinte de la relative)
if(froot===relFifth){
  priority = Math.min(priority,2);
  tags.push("relativePlayable+");
}
// 🥉 RelativePlayable normal
else if(neighbors(rel.replace("m","")).includes(froot)){
  priority = Math.min(priority,3);
  tags.push("relativePlayable");
}
      // 🥉 Quinte
      if(froot===q){
        priority = Math.min(priority,3);
        tags.push("quinte");
      }
    }

    // 🎼 LOGIQUE MAJEURE
    else{
      // 🥈 Quinte
      if(froot===q){
        priority = Math.min(priority,2);
        tags.push("quinte");
      }
    }

    // 🥉 Sous-dominante forte
    if(froot===sub){
      priority = Math.min(priority,3);
      tags.push("voisine+");
    }

    // 🥉 Voisines
    if(neigh.includes(froot)){
      priority = Math.min(priority,3);
      tags.push("voisine");
    }

    // ⭐ Relative exacte
    if(f.key===rel){
      priority = Math.min(priority,4);
      tags.push("relative");
    }

    return {...f,priority,tags};
  });

  scored.sort((a,b)=>{
    if(a.priority!==b.priority) return a.priority-b.priority;
    return a.name.localeCompare(b.name);
  });

  const best = scored.slice(0,3);

  let html = `
  <div><b>Tonalité :</b> ${k}</div>
  <div><b>Relative :</b> ${rel}</div>
  <hr>
  <div><b>🥇 Meilleurs choix</b></div>
  ${best.map((f,i)=>row(f,i)).join("")}
  `;

  out.innerHTML = html;
}

function row(f,i){
  const medal = i===0?"🥇":i===1?"🥈":"🥉";
  const tag = f.tags.map(t=>`<span class="badge rel">${t}</span>`).join("");
  return `<div>• ${f.name} <span class="badge">${medal}</span> ${tag}</div>`;
}
</script>
</body>
</html>
